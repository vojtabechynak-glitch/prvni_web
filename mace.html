    <h1>Mace Tips</h1>

    <div class="content">

        <p>You can repair the mace with mending, but also using breeze rods on an anvil.</p>
        <img src="./obrázky/mace+breezerod.png" class="center-img">

        <p>You can deal more damage by hitting first and swapping to the mace at the same tick.</p>
        <img src="./obrázky/mace_swap.png" class="center-img">

        <a href="index.html" class="back">⬅ Back to main page</a>

    </div>

    <script>
        const darkModeBtn = document.getElementById('darkModeBtn');
        const body = document.body;

        if (localStorage.getItem('darkMode') === 'enabled') {
            body.classList.add('dark-mode');
            darkModeBtn.textContent = '☀️';
        }

        darkModeBtn.addEventListener('click', function() {
            body.classList.toggle('dark-mode');
            
            if (body.classList.contains('dark-mode')) {
                darkModeBtn.textContent = '☀️';
                localStorage.setItem('darkMode', 'enabled');
            } else {
                darkModeBtn.textContent = '🌙';
                localStorage.setItem('darkMode', 'disabled');
            }
        });
    </script>

</body>
</html>
